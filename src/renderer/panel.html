<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./styles/app.css" />
    <script src="./accent-init.js"></script>
    <script src="./i18n/strings.js"></script>
    <script src="./i18n/i18n.js"></script>
  </head>
  <body class="nyx-body-panel w-[320px] flex flex-col">
    <!-- header -->
    <div class="nyx-row px-4 pt-3.5 pb-3" style="border-bottom: var(--hair)">
      <div class="flex items-center gap-2.5">
        <span class="nyx-mark" style="width:22px;height:22px;filter:drop-shadow(0 0 6px var(--accent-line))"></span>
        <span class="text-sm font-semibold">Nyx</span>
      </div>
      <span class="nyx-pill"><span id="dot" class="nyx-dot"></span><span id="stateLabel">Idle</span></span>
    </div>

    <!-- hero -->
    <div class="flex flex-col items-center gap-4 px-5 pt-6 pb-5">
      <div id="orb" class="nyx-orb nyx-orb--idle" style="width:78px;height:78px">
        <div class="nyx-orb-ring" style="width:78px;height:78px"></div>
        <div class="nyx-orb-ring" style="width:54px;height:54px;animation-delay:.5s"></div>
        <div class="nyx-orb-core" style="width:30px;height:30px"></div>
      </div>
      <div class="text-center">
        <h2 id="statusLine" class="text-[17px] font-semibold tracking-[-0.01em]">Idle</h2>
        <p id="statusSub" class="text-[12.5px] mt-1.5 nyx-muted">Waiting for something to play</p>
      </div>
    </div>

    <!-- now watching (only while playback is detected) -->
    <div id="npRow" class="px-4 py-3.5" style="border-top: var(--hair);display:none">
      <div class="nyx-seclabel mb-2.5" data-i18n="nowWatching">Now watching</div>
      <div class="flex items-center gap-3">
        <img id="npIcon" width="30" height="30" alt="" style="border-radius:7px;display:none;flex:none" />
        <div class="flex-1 min-w-0">
          <div id="npTitle" class="text-[13px] font-medium truncate">—</div>
          <div id="npApp" class="text-[11.5px] nyx-faint mt-0.5"></div>
        </div>
      </div>
    </div>

    <!-- last night -->
    <div class="px-4 py-3.5" style="border-top: var(--hair)">
      <div class="nyx-seclabel mb-2.5" data-i18n="panel.lastNight">Last night</div>
      <div class="flex items-center gap-3">
        <div class="nyx-thumb" style="width:44px;height:30px"></div>
        <div class="flex-1 min-w-0">
          <div id="recapTitle" class="text-[13px] font-medium truncate">No sleep events yet</div>
          <div id="recapTime" class="text-[11.5px] nyx-faint mt-0.5"></div>
        </div>
      </div>
    </div>

    <!-- monitoring -->
    <div class="px-4 py-3 flex flex-col gap-2.5" style="border-top: var(--hair)">
      <div class="nyx-seg w-full" id="mode" data-value="auto">
        <button class="flex-1" data-value="auto" data-i18n="mode.auto">Auto</button>
        <button class="flex-1" data-value="off" data-i18n="mode.off">Off</button>
        <button class="flex-1" data-value="snooze" data-i18n="mode.snooze">Snooze</button>
      </div>
      <button id="watchToggle" class="nyx-btn w-full" style="display:none" data-i18n="watch.start">Start watching now</button>
    </div>

    <!-- footer actions -->
    <div class="flex text-[12.5px] nyx-muted" style="border-top: var(--hair)">
      <button id="settings" class="flex-1 py-3 transition-colors hover:text-[color:var(--text)]" data-i18n="btn.settings">Settings</button>
      <span style="width:1px;background:rgba(255,255,255,.07)"></span>
      <button id="calibrate" class="flex-1 py-3 transition-colors hover:text-[color:var(--text)]" data-i18n="btn.calibrate">Calibrate</button>
      <span style="width:1px;background:rgba(255,255,255,.07)"></span>
      <button id="quit" class="flex-1 py-3 transition-colors hover:text-[color:var(--text)]" title="Quit Nyx" data-i18n="btn.quit">Quit</button>
    </div>

    <script src="./panel.js"></script>
  </body>
</html>
