<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./styles/app.css" />
    <script src="./accent-init.js"></script>
    <script src="./i18n/strings.js"></script>
    <script src="./i18n/i18n.js"></script>
  </head>
  <body class="w-[460px] p-6 flex flex-col gap-5">
    <section class="flex flex-col gap-3">
      <h3 class="text-[12px] uppercase tracking-wide nyx-muted" data-i18n="settings.detection">Detection</h3>
      <div class="nyx-card flex flex-col gap-3">
        <div class="nyx-row"><label class="text-[13px]" data-i18n="settings.delay">Fall-asleep delay</label>
          <div class="nyx-stepper" data-target="tAsleepSec" data-min="5" data-max="3600">
            <button data-step="-5">−</button><input id="tAsleepSec" type="number" min="5" max="3600" /><button data-step="5">+</button><span class="nyx-muted text-xs ml-1" data-i18n="unit.seconds">s</span>
          </div>
        </div>
        <div class="nyx-row"><label class="text-[13px]" data-i18n="settings.threshold">Eye-closed threshold</label>
          <div class="flex items-center gap-2"><span id="threshold" class="nyx-muted text-[13px]">—</span><button id="recalibrate" class="nyx-btn" data-i18n="settings.recalibrate">Recalibrate</button></div>
        </div>
      </div>
    </section>

    <section class="flex flex-col gap-3">
      <h3 class="text-[12px] uppercase tracking-wide nyx-muted" data-i18n="settings.escalation">Escalation</h3>
      <div class="nyx-card flex flex-col gap-3">
        <div class="nyx-row"><label class="text-[13px]" data-i18n="settings.nudgeWait">Nudge wait</label>
          <div class="nyx-stepper" data-target="nudgeWaitSec" data-min="5" data-max="600">
            <button data-step="-5">−</button><input id="nudgeWaitSec" type="number" min="5" max="600" /><button data-step="5">+</button><span class="nyx-muted text-xs ml-1" data-i18n="unit.seconds">s</span>
          </div>
        </div>
        <div class="nyx-row"><label class="text-[13px]" data-i18n="settings.pauseWait">Pause wait</label>
          <div class="nyx-stepper" data-target="pauseWaitSec" data-min="5" data-max="600">
            <button data-step="-5">−</button><input id="pauseWaitSec" type="number" min="5" max="600" /><button data-step="5">+</button><span class="nyx-muted text-xs ml-1" data-i18n="unit.seconds">s</span>
          </div>
        </div>
        <div class="nyx-row"><label class="text-[13px]" data-i18n="settings.finalAction">Final action</label>
          <div class="nyx-seg" id="finalAction" data-value="sleep">
            <button data-value="sleep" data-i18n="final.sleep">Sleep</button><button data-value="displayOff" data-i18n="final.display">Display</button><button data-value="pauseOnly" data-i18n="final.pause">Pause</button>
          </div>
        </div>
      </div>
    </section>

    <section class="flex flex-col gap-3">
      <h3 class="text-[12px] uppercase tracking-wide nyx-muted" data-i18n="settings.night">Night hours</h3>
      <div class="nyx-card flex flex-col gap-3">
        <div class="nyx-row">
          <label class="text-[13px]" data-i18n="settings.onlyNight">Only monitor at night</label>
          <label class="nyx-switch"><input id="nightHoursEnabled" type="checkbox" /><span class="track"></span></label>
        </div>
        <div class="nyx-row"><span class="nyx-muted text-[13px]" data-i18n="settings.window">Window</span>
          <div class="flex items-center gap-2 nyx-muted text-xs">
            <span data-i18n="settings.from">from</span> <div class="nyx-stepper" data-target="nightHoursStart" data-min="0" data-max="23"><button data-step="-1">−</button><input id="nightHoursStart" type="number" min="0" max="23" /><button data-step="1">+</button></div>
            <span data-i18n="settings.to">to</span> <div class="nyx-stepper" data-target="nightHoursEnd" data-min="0" data-max="23"><button data-step="-1">−</button><input id="nightHoursEnd" type="number" min="0" max="23" /><button data-step="1">+</button></div>
          </div>
        </div>
      </div>
    </section>

    <section class="flex flex-col gap-3">
      <h3 class="text-[12px] uppercase tracking-wide nyx-muted" data-i18n="settings.general">General</h3>
      <div class="nyx-card flex flex-col gap-3">
        <div class="nyx-row"><label class="text-[13px]" data-i18n="settings.launchLogin">Launch at login</label>
          <label class="nyx-switch"><input id="openAtLogin" type="checkbox" /><span class="track"></span></label>
        </div>
        <div class="nyx-row"><label class="text-[13px]"><span data-i18n="settings.logData">Log detection data</span> <span class="nyx-muted" data-i18n="settings.numbersOnly">(numbers only)</span></label>
          <div class="flex items-center gap-2">
            <button id="revealLog" class="nyx-btn" data-i18n="settings.revealLog">Reveal log</button>
            <label class="nyx-switch"><input id="logDetection" type="checkbox" /><span class="track"></span></label>
          </div>
        </div>
        <div class="nyx-row"><label class="text-[13px]" data-i18n="settings.language">Language</label>
          <div class="nyx-seg" id="language" data-value="auto">
            <button data-value="auto" data-i18n="lang.auto">Auto</button><button data-value="en">EN</button><button data-value="uk">UK</button>
          </div>
        </div>
      </div>
    </section>

    <script src="./settings.js"></script>
  </body>
</html>
