<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./styles/app.css" />
    <script src="./accent-init.js"></script>
    <script src="./i18n/strings.js"></script>
    <script src="./i18n/i18n.js"></script>
    <style>
      .preview-frame {
        position: relative; width: 320px; height: 214px; border-radius: 14px; overflow: hidden;
        border: var(--hair-2);
        background:
          repeating-linear-gradient(120deg, rgba(255,255,255,.04), rgba(255,255,255,.04) 6px, transparent 6px, transparent 15px),
          radial-gradient(120% 100% at 50% 30%, #20242f, #0c0e13);
      }
      #preview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); background: transparent; }
      .face-guide {
        position: absolute; left: 50%; top: 46%; transform: translate(-50%, -50%);
        width: 118px; height: 154px; border-radius: 50% 50% 48% 48%;
        border: 2px dashed var(--accent-line); box-shadow: 0 0 40px rgba(173,168,255,.15) inset; pointer-events: none;
      }
      #dots .d { width: 8px; height: 8px; border-radius: 999px; background: rgba(255,255,255,0.18); }
      #dots .d.on { background: var(--accent); box-shadow: 0 0 8px var(--accent-line); }
    </style>
  </head>
  <body class="nyx-body-window w-[480px] flex flex-col">
    <div class="nyx-titlebar"></div>

    <div class="px-6 pb-7 flex flex-col items-center gap-4">
      <h2 class="text-[20px] font-semibold self-start tracking-[-0.01em]" data-i18n="calib.title">Calibrate Nyx</h2>

      <div class="preview-frame">
        <video id="preview" autoplay playsinline muted></video>
        <div class="face-guide"></div>
      </div>

      <p id="instruction" class="text-center text-[15px] leading-[1.5] max-w-[360px] mt-1" data-i18n-html="calib.step1">Step 1 — look at the camera with your eyes <b>open</b>, then click Capture ~10 times.</p>

      <div class="flex items-center gap-2 text-[13px] nyx-muted"><span data-i18n="calib.blink">Blink score:</span> <span id="score" class="nyx-mono">—</span></div>
      <div class="flex gap-1.5" id="dots"></div>
      <button id="capture" class="nyx-btn nyx-btn-primary px-7" data-i18n="calib.capture">Capture</button>
      <div id="status" class="nyx-faint text-[13px] h-4"></div>
    </div>

    <script src="./calibration.js"></script>
  </body>
</html>
